# =============================================================================
# LibraryMind — Local development stack
#
# Bring up:  docker compose up --build
# Tear down: docker compose down -v
#
# The `api` service mounts the source tree so uvicorn's --reload picks up
# code changes without rebuilding the image.
# =============================================================================

name: librarymind

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: librarymind/api:dev
    container_name: librarymind-api
    env_file: .env
    environment:
      # Inside the docker network, redis is reachable by service name.
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Source mount enables hot-reload during development.
      - ./app:/app/app:ro
      - ./scripts:/app/scripts:ro
      # Persistent vector store — survives container restarts.
      - chroma_data:/app/data/chroma
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Override default CMD to enable --reload for development.
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--reload",
      ]

  redis:
    image: redis:7-alpine
    container_name: librarymind-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  chroma_data:
  redis_data:
