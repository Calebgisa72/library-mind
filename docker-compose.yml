# =============================================================================
# LibraryMind — Full stack (production-style defaults)
#
#   Start everything:   docker compose up --build -d
#   Seed the catalogue: docker compose --profile seed run --rm seed
#   Tear down:          docker compose down            (keep data)
#                       docker compose down -v         (wipe Redis + ChromaDB)
#
# Development mode (hot reload for backend + frontend):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Services:
#   frontend — Next.js 14 web client            → http://localhost:3000
#   api      — FastAPI backend (Swagger /docs)  → http://localhost:8000
#   redis    — cache / rate-limiter backing store
#   seed     — one-off ChromaDB seeding job (profile: seed)
#
# ChromaDB runs embedded inside the api container (persistent local client);
# its data lives in the `chroma_data` volume rather than a separate service.
# =============================================================================

name: librarymind

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: librarymind/api:latest
    container_name: librarymind-api
    env_file: .env
    environment:
      # Inside the docker network, services are reachable by service name.
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /app/data/chroma
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Persistent vector store — survives container restarts.
      - chroma_data:/app/data/chroma
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        # Inlined into the client bundle at build time. Must be the URL the
        # BROWSER uses to reach the API (not the internal docker hostname).
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    image: librarymind/frontend:latest
    container_name: librarymind-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: librarymind-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # One-off job: embed app/data/books.json and upsert into ChromaDB.
  # Run AFTER the stack is up:  docker compose --profile seed run --rm seed
  seed:
    image: librarymind/api:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /app/data/chroma
    command: ["python", "-m", "scripts.seed_vector_store"]
    volumes:
      - chroma_data:/app/data/chroma
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["seed"]
    restart: "no"

volumes:
  chroma_data:
  redis_data:
