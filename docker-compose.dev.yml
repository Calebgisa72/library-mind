# =============================================================================
# LibraryMind — Development override (hot reload)
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Backend:  source bind-mounted, uvicorn --reload picks up changes.
# Frontend: source bind-mounted, `next dev` with file-watch polling
#           (required on Docker Desktop for Windows/macOS).
# node_modules and .next stay in named volumes so the host's Windows-built
# node_modules never shadows the Linux ones inside the container.
# =============================================================================

services:
  api:
    volumes:
      - ./app:/app/app:ro
      - ./scripts:/app/scripts:ro
      - chroma_data:/app/data/chroma
    environment:
      LOG_FORMAT: console
    command:
      [
        "uvicorn", "app.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--reload",
      ]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    image: librarymind/frontend:dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: ["npm", "run", "dev"]
    # `next dev` has no production healthcheck; don't gate startup on the api.
    depends_on:
      redis:
        condition: service_healthy

volumes:
  frontend_node_modules:
  frontend_next:
